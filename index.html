<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="monetag" content="9c1ef2efca0d247d51edb0d194d22a34">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga para Smart TV</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 10%; }
        h1 { font-size: 3rem; }
        .contador { font-size: 2rem; color: #ff9900; margin: 20px; }
        .btn-descarga { display: none; font-size: 2.5rem; background-color: #007bff; color: white; padding: 15px 40px; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; }
        .btn-descarga:focus { background-color: #28a745; outline: 5px solid #fff; } /* Crucial para el control remoto de la TV */
        .publicidad { margin: 30px auto; min-height: 250px; width: 100%; max-width: 728px; background: #222; }
    </style>
</head>
<body>

    <h1>Tu descarga estará lista en breve...</h1>
    
    <!-- ZONA DE PUBLICIDAD (Aquí pegas el código de tu red de anuncios) -->
    <div class="publicidad">
        <"meta name="monetag" content="9c1ef2efca0d247d51edb0d194d22a34">
        <p style="color:#666; padding-top:100px;">[Espacio Publicitario]</p>
    </div>

    <div class="contador" id="tiempo">Esperando 10 segundos...</div>
    
    <!-- BOTÓN OCULTO QUE SE ACTIVA AL FINALIZAR EL TIEMPO -->
    <a href="TU_ENLACE_DIRECTO_DE_MEDIAFIRE_AQUÍ" class="btn-descarga" id="boton">DESCARGAR AHORA</a>

    <script>
        let segundos = 10;
        const textoTiempo = document.getElementById('tiempo');
        const botonDescarga = document.getElementById('boton');

        const cuentaAtras = setInterval(() => {
            segundos--;
            textoTiempo.textContent = `Esperando ${segundos} segundos...`;
            
            if (segundos <= 0) {
                clearInterval(cuentaAtras);
                textoTiempo.style.display = 'none';
                botonDescarga.style.display = 'inline-block';
                botonDescarga.focus(); // Enfoca automáticamente el botón para que el usuario solo tenga que pulsar "OK" en su control
            }
        }, 1000);
    </script>
</body>
</html>
