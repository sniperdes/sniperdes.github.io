<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Hub - Smart TV</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; text-align: center; padding: 5%; }
        h1 { font-size: 3rem; color: #ff9900; margin-bottom: 30px; }
        .grid-apps { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 600px; margin: 0 auto; }
        .btn-app { 
            display: block; 
            width: 100%; 
            font-size: 2.2rem; 
            background-color: #222; 
            color: white; 
            padding: 20px; 
            border: 3px solid #444; 
            border-radius: 15px; 
            text-decoration: none; 
            box-sizing: border-box;
            transition: 0.2s;
        }
        /* Esto es vital para que resalte al usar las flechas del control de la TV */
        .btn-app:focus { 
            background-color: #28a745; 
            border-color: #fff; 
            transform: scale(1.05); 
            outline: none; 
        }
    </style>
</head>
<body>

    <h1>Selecciona una Aplicación</h1>
    
    <div class="grid-apps">
        <!-- Puedes duplicar estas líneas para agregar todas las apps que quieras -->
        <a href="./app1/" class="btn-app">📺 DESCARGAR APP DE PELÍCULAS</a>
        <a href="./app2/" class="btn-app">⚽ DESCARGAR APP DE DEPORTES</a>
        <a href="./app3/" class="btn-app">🚀 DESCARGAR OPTIMIZADOR TV</a>
    </div>

    <script>
        // Auto-enfoca la primera opción al cargar para comodidad en Smart TV
        document.querySelector('.btn-app').focus();
    </script>
</body>
</html>
