<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Hub - Smart TV</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; text-align: center; padding: 5%; }
        h1 { font-size: 3rem; color: #ff9900; margin-bottom: 30px; }
        .grid-apps { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Botón estilo tarjeta moderna */
        .btn-app { 
            display: flex; 
            align-items: center; /* Alinea verticalmente la imagen y el texto */
            width: 100%; 
            font-size: 2rem; 
            background-color: #222; 
            color: white; 
            padding: 15px 25px; 
            border: 3px solid #444; 
            border-radius: 15px; 
            text-decoration: none; 
            box-sizing: border-box;
            transition: 0.2s;
            text-align: left; /* Texto alineado a la izquierda al lado del logo */
        }
        
        /* Estilo para las imágenes dentro de los botones */
        .img-app {
            width: 60px; /* Tamaño ideal para que se vea bien en TV */
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 20px; /* Separa la imagen del texto */
            background-color: #333; /* Fondo por si la imagen tarda en cargar */
        }

        /* Efecto visual al navegar con el control de la TV */
        .btn-app:focus { 
            background-color: #28a745; 
            border-color: #fff; 
            transform: scale(1.04); 
            outline: none; 
        }
    </style>
</head>
<body>

    <h1>Selecciona una Aplicación</h1>
    
    <div class="grid-apps">
        <!-- BOTÓN 1 -->
        <a href="./app1/" class="btn-app">
            <img src="./logo-cine.png" alt="Icono Cine" class="img-app">
            <span>📺 DESCARGAR APP DE PELÍCULAS</span>
        </a>
        
        <!-- BOTÓN 2 -->
        <a href="./app2/" class="btn-app">
            <img src="./logo-deportes.png" alt="Icono Deportes" class="img-app">
            <span>⚽ DESCARGAR APP DE DEPORTES</span>
        </a>
        
        <!-- BOTÓN 3 -->
        <a href="./app3/" class="btn-app">
            <img src="./logo-optimizador.png" alt="Icono Optimizador" class="img-app">
            <span>🚀 DESCARGAR OPTIMIZADOR TV</span>
        </a>
    </div>

    <script>
        // Auto-enfoca la primera opción al cargar para comodidad en Smart TV
        document.querySelector('.btn-app').focus();
    </script>
</body>
</html>
